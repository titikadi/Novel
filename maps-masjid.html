<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta Masjid Terdekat</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1B6B45;
  --green-mid: #2D9E6B;
  --green-light: #4DC48A;
  --green-pale: #E8F5EE;
  --green-ultra: #F0FAF5;
  --gold: #C8922A;
  --gold-light: #F0B84A;
  --gold-pale: #FDF6E8;
  --ink: #0F1A14;
  --ink-mid: #2C4235;
  --ink-soft: #4A6B58;
  --ink-faint: #8AAD96;
  --surface: #FFFFFF;
  --bg: #F2F7F4;
  --border: #D4E8DB;
  --shadow-sm: 0 2px 8px rgba(15,26,20,0.08);
  --shadow-md: 0 4px 20px rgba(15,26,20,0.12);
  --shadow-lg: 0 8px 40px rgba(15,26,20,0.16);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* ─── TOPBAR ─── */
.topbar {
  background: var(--green);
  color: white;
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 1000;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(15,26,20,0.25);
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

.logo-text {
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.logo-sub {
  font-size: 0.7rem;
  opacity: 0.7;
  font-weight: 400;
  display: block;
  margin-top: -2px;
}

.topbar-search {
  flex: 1;
  max-width: 420px;
  position: relative;
  margin-left: auto;
}

.topbar-search input {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 24px;
  padding: 8px 16px 8px 40px;
  color: white;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}

.topbar-search input::placeholder { color: rgba(255,255,255,0.6); }
.topbar-search input:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.7;
  font-size: 0.9rem;
}

.topbar-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  border-radius: 8px;
  padding: 7px 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: background 0.2s;
}

.topbar-btn:hover { background: rgba(255,255,255,0.25); }
.topbar-btn.active { background: var(--gold); border-color: var(--gold); }

/* ─── MAIN LAYOUT ─── */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── PANEL ─── */
.panel {
  width: 360px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 500;
}

.panel-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--green-ultra);
}

.panel-title {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 4px;
}

.panel-count {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--ink);
}

.panel-count span {
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--ink-soft);
  margin-left: 4px;
}

.radius-bar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.radius-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: var(--ink-soft);
}

.radius-val {
  font-weight: 600;
  color: var(--green);
}

.radius-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}

.radius-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--green);
  border: 3px solid white;
  box-shadow: 0 2px 6px rgba(27,107,69,0.4);
  cursor: pointer;
}

/* ─── MASJID LIST ─── */
.masjid-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.masjid-list::-webkit-scrollbar { width: 4px; }
.masjid-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.masjid-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  position: relative;
}

.masjid-item:hover { background: var(--green-ultra); }
.masjid-item.active { background: var(--green-pale); border-left: 3px solid var(--green); }

.masjid-rank {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--green-pale);
  border: 1.5px solid var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--green);
  flex-shrink: 0;
  margin-top: 2px;
}

.masjid-item.active .masjid-rank {
  background: var(--green);
  color: white;
  border-color: var(--green);
}

.masjid-info { flex: 1; min-width: 0; }

.masjid-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.masjid-addr {
  font-size: 0.75rem;
  color: var(--ink-soft);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
}

.masjid-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.68rem;
  font-weight: 500;
}

.tag-dist {
  background: var(--green-pale);
  color: var(--green);
}

.tag-type {
  background: var(--gold-pale);
  color: var(--gold);
}

.masjid-nav-btn {
  background: var(--green);
  border: none;
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 4px;
  transition: background 0.15s;
  text-decoration: none;
}

.masjid-nav-btn:hover { background: var(--green-mid); }

/* ─── MAP ─── */
#map {
  flex: 1;
  z-index: 1;
}

/* ─── LOADING OVERLAY ─── */
.map-overlay {
  position: absolute;
  inset: 58px 0 0 360px;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(242,247,244,0.85);
  backdrop-filter: blur(4px);
  flex-direction: column;
  gap: 16px;
  transition: opacity 0.3s;
}

.map-overlay.hidden { opacity: 0; pointer-events: none; }

.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.overlay-text {
  font-size: 0.9rem;
  color: var(--ink-soft);
  font-weight: 500;
}

/* ─── DETAIL POPUP (custom) ─── */
.leaflet-popup-content-wrapper {
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow-lg) !important;
  border: none !important;
  padding: 0 !important;
  overflow: hidden;
}

.leaflet-popup-content {
  margin: 0 !important;
  width: 280px !important;
}

.leaflet-popup-tip { background: white !important; }

.popup-inner {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.popup-header {
  background: var(--green);
  padding: 14px 16px;
  color: white;
}

.popup-masjid-icon {
  font-size: 1.4rem;
  margin-bottom: 4px;
  display: block;
}

.popup-name {
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.3;
}

.popup-body {
  padding: 14px 16px;
}

.popup-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: var(--ink-soft);
}

.popup-row:last-child { margin-bottom: 0; }

.popup-icon { width: 16px; flex-shrink: 0; margin-top: 1px; }

.popup-actions {
  display: flex;
  gap: 8px;
  padding: 0 16px 14px;
}

.popup-btn {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  display: block;
  transition: opacity 0.15s;
}

.popup-btn:hover { opacity: 0.85; }

.popup-btn-primary {
  background: var(--green);
  color: white;
}

.popup-btn-secondary {
  background: var(--green-pale);
  color: var(--green);
}

/* ─── EMPTY / ERROR ─── */
.list-empty {
  padding: 40px 24px;
  text-align: center;
  color: var(--ink-faint);
}

.list-empty-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }

.list-empty-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.list-empty-desc { font-size: 0.8rem; line-height: 1.6; }

/* ─── MY LOCATION MARKER ─── */
.my-loc-marker {
  width: 20px;
  height: 20px;
  background: #2563EB;
  border: 3px solid white;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.25);
  animation: pulse-blue 2s infinite;
}

@keyframes pulse-blue {
  0%, 100% { box-shadow: 0 0 0 4px rgba(37,99,235,0.25); }
  50% { box-shadow: 0 0 0 8px rgba(37,99,235,0.1); }
}

/* ─── BOTTOM STATUS BAR ─── */
.status-bar {
  position: absolute;
  bottom: 20px;
  left: 380px;
  right: 20px;
  display: flex;
  justify-content: center;
  z-index: 600;
  pointer-events: none;
}

.status-pill {
  background: white;
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 18px;
  font-size: 0.8rem;
  color: var(--ink-soft);
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: auto;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green-light);
  animation: pulse-green 2s infinite;
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── FILTER CHIPS ─── */
.filter-bar {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 4px 12px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.filter-chip:hover { border-color: var(--green); color: var(--green); }
.filter-chip.active { background: var(--green); border-color: var(--green); color: white; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .panel { width: 100%; position: absolute; bottom: 0; left: 0; right: 0; height: 50vh; border-right: none; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; z-index: 800; }
  .map-overlay { inset: 58px 0 50vh 0; }
  .status-bar { left: 20px; bottom: calc(50vh + 10px); }
  .topbar-search { display: none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">🕌</div>
    <div>
      <div class="logo-text">MasjidMap</div>
      <span class="logo-sub">Temukan Masjid Terdekat</span>
    </div>
  </div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="citySearch" placeholder="Cari kota atau daerah..." onkeydown="if(event.key==='Enter') searchCity()">
  </div>
  <button class="topbar-btn" id="locBtn" onclick="getMyLocation()">📍 Lokasi Saya</button>
</div>

<!-- BODY -->
<div class="app-body">

  <!-- PANEL KIRI -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Masjid Ditemukan</div>
      <div class="panel-count" id="foundCount">0 <span>masjid</span></div>
    </div>

    <div class="radius-bar">
      <div class="radius-label">
        <span>Radius Pencarian</span>
        <span class="radius-val" id="radiusVal">2 km</span>
      </div>
      <input type="range" class="radius-slider" min="500" max="10000" step="500" value="2000" id="radiusSlider" oninput="updateRadius(this.value)">
    </div>

    <div class="filter-bar">
      <div class="filter-chip active" onclick="setFilter('all', this)">Semua</div>
      <div class="filter-chip" onclick="setFilter('mosque', this)">Masjid</div>
      <div class="filter-chip" onclick="setFilter('musalla', this)">Musholla</div>
      <div class="filter-chip" onclick="setFilter('jami', this)">Masjid Jami'</div>
    </div>

    <div class="masjid-list" id="masjidList">
      <div class="list-empty">
        <span class="list-empty-icon">🕌</span>
        <div class="list-empty-title">Belum ada data</div>
        <div class="list-empty-desc">Klik "Lokasi Saya" untuk mencari masjid di sekitar Anda, atau cari kota di kolom pencarian.</div>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-pill" id="statusPill" style="display:none">
      <div class="status-dot"></div>
      <span id="statusText">Mencari masjid...</span>
    </div>
  </div>
</div>

<!-- OVERLAY LOADING -->
<div class="map-overlay" id="mapOverlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">Memuat peta...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let map, userMarker, userCircle;
let masjidMarkers = [];
let allMasjids = [];
let filteredMasjids = [];
let userPos = null;
let searchRadius = 2000;
let activeFilter = 'all';
let activeItemIdx = -1;

// ─── INIT MAP ─────────────────────────────────────────────────────────────────
function initMap(lat, lng) {
  if (map) map.remove();

  map = L.map('map', {
    center: [lat, lng],
    zoom: 15,
    zoomControl: false,
  });

  // Tile layer - OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // Zoom control bottom right
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Click on map to search that location
  map.on('click', function(e) {
    setLocation(e.latlng.lat, e.latlng.lng, false);
  });

  hideOverlay();
}

// ─── USER LOCATION ────────────────────────────────────────────────────────────
function getMyLocation() {
  showOverlay('Mendapatkan lokasi Anda...');
  setStatus('Mengakses GPS...');

  if (!navigator.geolocation) {
    hideOverlay();
    alert('Browser Anda tidak mendukung GPS. Silakan cari kota secara manual.');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      setLocation(pos.coords.latitude, pos.coords.longitude, true);
    },
    err => {
      hideOverlay();
      hideStatus();
      // Default ke Pekanbaru jika GPS gagal
      alert('GPS tidak dapat diakses. Menampilkan lokasi default (Pekanbaru).');
      setLocation(0.5335, 101.4501, false);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function setLocation(lat, lng, isUser) {
  userPos = { lat, lng };
  showOverlay('Memuat peta...');

  if (!map) {
    initMap(lat, lng);
  } else {
    map.setView([lat, lng], 15);
  }

  // Remove old user marker
  if (userMarker) { map.removeLayer(userMarker); }
  if (userCircle) { map.removeLayer(userCircle); }

  // User marker
  const userIcon = L.divIcon({
    className: '',
    html: '<div class="my-loc-marker"></div>',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });

  userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup(`<div style="font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;font-size:0.85rem;font-weight:600;color:#1B6B45">📍 Lokasi Anda</div>`);

  // Radius circle
  userCircle = L.circle([lat, lng], {
    radius: searchRadius,
    color: '#1B6B45',
    fillColor: '#1B6B45',
    fillOpacity: 0.06,
    weight: 1.5,
    dashArray: '6 4',
  }).addTo(map);

  searchMasjid(lat, lng);
}

// ─── SEARCH MASJID VIA OVERPASS ───────────────────────────────────────────────
async function searchMasjid(lat, lng) {
  showOverlay('Mencari masjid terdekat...');
  setStatus('Mencari masjid...');
  clearMasjidMarkers();

  const r = searchRadius;
  // Overpass API query — cari masjid & musholla
  const query = `
    [out:json][timeout:25];
    (
      node["amenity"="place_of_worship"]["religion"="muslim"](around:${r},${lat},${lng});
      way["amenity"="place_of_worship"]["religion"="muslim"](around:${r},${lat},${lng});
      node["amenity"="place_of_worship"]["building"="mosque"](around:${r},${lat},${lng});
    );
    out body center qt;
  `;

  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query),
    });

    const data = await res.json();
    processResults(data.elements, lat, lng);
  } catch(e) {
    // Fallback: try nominatim search
    try {
      await fallbackNominatim(lat, lng);
    } catch(e2) {
      hideOverlay();
      setStatus('Gagal memuat data. Coba lagi.');
      setTimeout(hideStatus, 3000);
    }
  }
}

async function fallbackNominatim(lat, lng) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?q=masjid&lat=${lat}&lon=${lng}&radius=${searchRadius/1000}&format=json&limit=30&countrycodes=id`);
  const data = await res.json();

  const elements = data.map(d => ({
    lat: parseFloat(d.lat),
    lon: parseFloat(d.lon),
    tags: { name: d.display_name.split(',')[0], amenity: 'place_of_worship', religion: 'muslim' },
  }));

  processResults(elements, lat, lon);
}

function processResults(elements, userLat, userLng) {
  allMasjids = [];

  elements.forEach(el => {
    const elLat = el.lat || el.center?.lat;
    const elLng = el.lon || el.center?.lon;
    if (!elLat || !elLng) return;

    const dist = getDistance(userLat, userLng, elLat, elLng);
    const name = el.tags?.name || el.tags?.['name:id'] || el.tags?.['name:en'] || 'Masjid / Musholla';
    const addr = buildAddress(el.tags);
    const type = detectType(el.tags);

    allMasjids.push({ lat: elLat, lng: elLng, name, addr, dist, type, tags: el.tags });
  });

  // Sort by distance
  allMasjids.sort((a, b) => a.dist - b.dist);

  applyFilter();
  hideOverlay();

  if (allMasjids.length === 0) {
    setStatus('Tidak ada masjid ditemukan dalam radius ini');
    setTimeout(hideStatus, 4000);
  } else {
    setStatus(`${allMasjids.length} masjid ditemukan`);
    setTimeout(hideStatus, 3000);
  }
}

function buildAddress(tags) {
  if (!tags) return '';
  const parts = [];
  if (tags['addr:street']) parts.push(tags['addr:street']);
  if (tags['addr:village'] || tags['addr:suburb']) parts.push(tags['addr:village'] || tags['addr:suburb']);
  if (tags['addr:city'] || tags['addr:county']) parts.push(tags['addr:city'] || tags['addr:county']);
  return parts.join(', ');
}

function detectType(tags) {
  if (!tags) return 'Masjid';
  const name = (tags.name || '').toLowerCase();
  if (name.includes('musholla') || name.includes('musalla') || name.includes('langgar')) return 'Musholla';
  if (name.includes('jami') || name.includes("jami'") || tags['mosque:type'] === 'jami') return "Masjid Jami'";
  return 'Masjid';
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  if (activeFilter === 'all') {
    filteredMasjids = [...allMasjids];
  } else if (activeFilter === 'musalla') {
    filteredMasjids = allMasjids.filter(m => m.type === 'Musholla');
  } else if (activeFilter === 'jami') {
    filteredMasjids = allMasjids.filter(m => m.type === "Masjid Jami'");
  } else {
    filteredMasjids = allMasjids.filter(m => m.type === 'Masjid');
  }

  renderList();
  renderMarkers();
  document.getElementById('foundCount').innerHTML = `${filteredMasjids.length} <span>masjid</span>`;
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('masjidList');

  if (filteredMasjids.length === 0) {
    list.innerHTML = `
      <div class="list-empty">
        <span class="list-empty-icon">🔍</span>
        <div class="list-empty-title">Tidak ada hasil</div>
        <div class="list-empty-desc">Coba perbesar radius pencarian atau ubah filter.</div>
      </div>
    `;
    return;
  }

  list.innerHTML = filteredMasjids.map((m, i) => `
    <div class="masjid-item ${i === activeItemIdx ? 'active' : ''}" id="item-${i}" onclick="focusMasjid(${i})">
      <div class="masjid-rank">${i+1}</div>
      <div class="masjid-info">
        <div class="masjid-name">${m.name}</div>
        ${m.addr ? `<div class="masjid-addr">📌 ${m.addr}</div>` : ''}
        <div class="masjid-tags">
          <span class="tag tag-dist">📏 ${formatDist(m.dist)}</span>
          <span class="tag tag-type">${m.type}</span>
        </div>
      </div>
      <a class="masjid-nav-btn" href="https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lng}" target="_blank" title="Navigasi" onclick="event.stopPropagation()">→</a>
    </div>
  `).join('');
}

// ─── RENDER MARKERS ───────────────────────────────────────────────────────────
function renderMarkers() {
  clearMasjidMarkers();

  filteredMasjids.forEach((m, i) => {
    const color = m.type === 'Musholla' ? '#C8922A' : m.type === "Masjid Jami'" ? '#7C3AED' : '#1B6B45';

    const icon = L.divIcon({
      className: '',
      html: `
        <div style="
          background:${color};
          color:white;
          width:32px;height:32px;border-radius:50% 50% 50% 4px;
          transform:rotate(-45deg);
          border:2.5px solid white;
          box-shadow:0 3px 10px rgba(0,0,0,0.25);
          display:flex;align-items:center;justify-content:center;
          font-size:14px;
        ">
          <span style="transform:rotate(45deg)">🕌</span>
        </div>
      `,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -36],
    });

    const marker = L.marker([m.lat, m.lng], { icon })
      .addTo(map)
      .bindPopup(buildPopup(m, i), { maxWidth: 300 });

    marker.on('click', () => {
      highlightItem(i);
    });

    masjidMarkers.push(marker);
  });
}

function buildPopup(m, i) {
  const gmapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lng}`;
  const wazeUrl = `https://waze.com/ul?ll=${m.lat},${m.lng}&navigate=yes`;

  return `
    <div class="popup-inner">
      <div class="popup-header">
        <span class="popup-masjid-icon">🕌</span>
        <div class="popup-name">${m.name}</div>
      </div>
      <div class="popup-body">
        ${m.addr ? `
        <div class="popup-row">
          <span class="popup-icon">📌</span>
          <span>${m.addr}</span>
        </div>` : ''}
        <div class="popup-row">
          <span class="popup-icon">📏</span>
          <span>Jarak dari lokasi Anda: <strong style="color:var(--green)">${formatDist(m.dist)}</strong></span>
        </div>
        <div class="popup-row">
          <span class="popup-icon">🏷️</span>
          <span>${m.type}</span>
        </div>
        <div class="popup-row">
          <span class="popup-icon">🌐</span>
          <span style="font-size:0.72rem;color:#888">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</span>
        </div>
      </div>
      <div class="popup-actions">
        <a href="${gmapsUrl}" target="_blank" class="popup-btn popup-btn-primary">🗺️ Google Maps</a>
        <a href="${wazeUrl}" target="_blank" class="popup-btn popup-btn-secondary">🚗 Waze</a>
      </div>
    </div>
  `;
}

function focusMasjid(i) {
  const m = filteredMasjids[i];
  if (!m) return;
  highlightItem(i);
  map.setView([m.lat, m.lng], 17, { animate: true });
  masjidMarkers[i]?.openPopup();
}

function highlightItem(i) {
  activeItemIdx = i;
  document.querySelectorAll('.masjid-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  // Scroll item into view
  const el = document.getElementById(`item-${i}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearMasjidMarkers() {
  masjidMarkers.forEach(m => map && map.removeLayer(m));
  masjidMarkers = [];
}

// ─── RADIUS ───────────────────────────────────────────────────────────────────
let radiusTimeout;
function updateRadius(val) {
  searchRadius = parseInt(val);
  document.getElementById('radiusVal').textContent = formatDist(searchRadius);

  if (userCircle) {
    userCircle.setRadius(searchRadius);
  }

  clearTimeout(radiusTimeout);
  radiusTimeout = setTimeout(() => {
    if (userPos) searchMasjid(userPos.lat, userPos.lng);
  }, 800);
}

// ─── CITY SEARCH ──────────────────────────────────────────────────────────────
async function searchCity() {
  const q = document.getElementById('citySearch').value.trim();
  if (!q) return;

  showOverlay(`Mencari "${q}"...`);

  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=id`);
    const data = await res.json();

    if (data.length === 0) {
      hideOverlay();
      alert('Lokasi tidak ditemukan. Coba nama kota lain.');
      return;
    }

    const { lat, lon } = data[0];
    setLocation(parseFloat(lat), parseFloat(lon), false);
    document.getElementById('citySearch').value = '';
  } catch(e) {
    hideOverlay();
    alert('Gagal mencari lokasi. Periksa koneksi internet.');
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  if (m >= 1000) return (m / 1000).toFixed(1) + ' km';
  return Math.round(m) + ' m';
}

function showOverlay(text) {
  document.getElementById('overlayText').textContent = text;
  document.getElementById('mapOverlay').classList.remove('hidden');
}

function hideOverlay() {
  document.getElementById('mapOverlay').classList.add('hidden');
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusPill').style.display = 'flex';
}

function hideStatus() {
  document.getElementById('statusPill').style.display = 'none';
}
