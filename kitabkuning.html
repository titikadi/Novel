<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maktabah Digital - Kitab Kuning</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600&family=Poppins:wght@300;400;600&display=swap');

  :root{
    --bg:#f5f1e8;
    --card:#fffdf8;
    --text:#2d2418;
    --muted:#6b5f4f;
    --accent:#8b7355;
    --accent2:#d4af37;
    --border:#e5dccf;
    --shadow:0 4px 20px rgba(139,115,85,0.15);
  }

  [data-theme="dark"]{
    --bg:#1a1815;
    --card:#242119;
    --text:#e8e2d5;
    --muted:#a39b8a;
    --accent:#b8965f;
    --accent2:#d4af37;
    --border:#3a3428;
    --shadow:0 4px 20px rgba(0,0,0,0.4);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;line-height:1.6;transition:0.3s}

  header{background:var(--card);border-bottom:2px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .header-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}

  h1{font-family:'Amiri',serif;font-size:24px;color:var(--accent);display:flex;align-items:center;gap:10px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  input,select,button{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;font-size:14px}
  input:focus,select:focus{outline:2px solid var(--accent2);border-color:var(--accent2)}
  button{background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:600;transition:0.2s}
  button:hover{background:var(--accent2);transform:translateY(-2px)}
  button.secondary{background:transparent;color:var(--accent);border:1px solid var(--accent)}

  .container{max-width:1200px;margin:0 auto;padding:24px 20px}
  .setup-card{background:var(--card);padding:24px;border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:24px}
  .setup-card h3{margin-bottom:12px;color:var(--accent)}
  .setup-card p{color:var(--muted);font-size:14px;margin-bottom:12px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .kitab-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);transition:0.3s;cursor:pointer}
  .kitab-card:hover{transform:translateY(-5px);box-shadow:0 8px 30px rgba(139,115,85,0.25)}
  .kitab-card h3{font-family:'Amiri',serif;font-size:20px;color:var(--accent);margin-bottom:8px}
  .kitab-card .author{color:var(--muted);font-size:14px;margin-bottom:12px}
  .kitab-card .desc{color:var(--text);font-size:14px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .badge{display:inline-block;padding:4px 12px;background:var(--accent2);color:#1a1815;border-radius:20px;font-size:12px;font-weight:600}

  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;overflow-y:auto;padding:40px 20px}
  .modal.active{display:flex;align-items:flex-start;justify-content:center}
  .modal-content{background:var(--card);max-width:800px;width:100%;border-radius:16px;padding:32px;position:relative;border:2px solid var(--border)}
  .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;font-size:28px;color:var(--muted);cursor:pointer;padding:0;width:40px;height:40px}
  .arabic{font-family:'Noto Naskh Arabic',serif;font-size:22px;line-height:2;direction:rtl;text-align:right}
  .loading,.error,.empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .loading::after{content:'';display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-left:10px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:768px){
    h1{font-size:20px}
    .grid{grid-template-columns:1fr}
    .modal-content{padding:20px}
    .arabic{font-size:18px}
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>📖 Maktabah Digital</h1>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Cari kitab, pengarang...">
      <select id="kategoriSelect">
        <option value="">Semua Kategori</option>
        <option value="Fiqih">Fiqih</option>
        <option value="Tafsir">Tafsir</option>
        <option value="Hadits">Hadits</option>
        <option value="Aqidah">Aqidah</option>
        <option value="Tasawuf">Tasawuf</option>
        <option value="Nahwu">Nahwu</option>
      </select>
      <button onclick="loadKitab()">Cari</button>
      <button class="secondary" onclick="toggleTheme()">🌓</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="setupCard" class="setup-card">
    <h3>🔑 Masukkan API Key</h3>
    <p>Dapatkan API key gratis di <a href="https://ahmadsanusi.com" target="_blank" style="color:var(--accent2)">ahmadsanusi.com</a>. Masukkan di sini, akan disimpan di browser kamu.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input type="password" id="apiKeyInput" placeholder="X-API-Key" style="flex:1;min-width:200px">
      <button onclick="saveApiKey()">Simpan & Muat Kitab</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API_URL = 'https://api.ahmadsanusi.com/v1/kitab';
let apiKey = localStorage.getItem('kitab_api_key') || '';
let currentKitab = [];

if(apiKey){
  document.getElementById('setupCard').style.display = 'none';
  loadKitab();
} else {
  document.getElementById('content').innerHTML = '<div class="empty">Masukkan API Key untuk mulai</div>';
}

function saveApiKey(){
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if(!apiKey){alert('API Key wajib diisi');return}
  localStorage.setItem('kitab_api_key', apiKey);
  document.getElementById('setupCard').style.display = 'none';
  loadKitab();
}

async function loadKitab(){
  const q = document.getElementById('searchInput').value.trim();
  const kategori = document.getElementById('kategoriSelect').value;
  const content = document.getElementById('content');

  content.innerHTML = '<div class="loading">Memuat kitab</div>';

  try{
    let url = API_URL + '?';
    if(q) url += `q=${encodeURIComponent(q)}&`;
    if(kategori) url += `kategori=${encodeURIComponent(kategori)}&`;

    const res = await fetch(url,{
      method: 'GET',
      headers:{
        'X-API-Key': apiKey,
        'accept': 'application/json'
      }
    });

    if(res.status === 401){
      content.innerHTML = '<div class="error">❌ API Key salah atau belum aktif</div>';
      localStorage.removeItem('kitab_api_key');
      document.getElementById('setupCard').style.display = 'block';
      return;
    }

    if(!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    const list = data.data?.kitab || [];
    currentKitab = list;
    renderKitab(list);

  }catch(err){
    content.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
  }
}

function renderKitab(list){
  const content = document.getElementById('content');

  if(!list || list.length === 0){
    content.innerHTML = '<div class="empty">Kitab tidak ditemukan</div>';
    return;
  }

  content.innerHTML = `<div class="grid">${list.map((k,i)=>`
    <div class="kitab-card" onclick="openKitab(${i})">
      <h3>${k.nama || k.nama_arab}</h3>
      <div class="author">✍️ ${k.pengarang}</div>
      <div class="desc">${k.deskripsi}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="badge">${k.kategori}</span>
        <span class="badge" style="background:var(--accent)">${k.mazhab}</span>
        <span class="badge">${k.total_bab} Bab</span>
      </div>
    </div>
  `).join('')}</div>`;
}

async function openKitab(index){
  const kitab = currentKitab[index];
  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');

  modalBody.innerHTML = `
    <h2 style="font-family:Amiri;font-size:28px;color:var(--accent);margin-bottom:10px">
      ${kitab.nama}
    </h2>
    <p style="font-size:20px;font-family:Amiri;text-align:right;direction:rtl;color:var(--accent2);margin-bottom:8px">
      ${kitab.nama_arab}
    </p>
    <p style="color:var(--muted);margin-bottom:20px">
      ✍️ ${kitab.pengarang} • ${kitab.mazhab} • ${kitab.total_bab} Bab
    </p>
    <div class="loading">Memuat isi kitab</div>
  `;

  modal.classList.add('active');

  // Coba 4 endpoint sekaligus biar ketemu
  const endpoints = [
    `${API_URL}/${kitab.id}`,
    `${API_URL}/${kitab.slug}`,
    `${API_URL}/${kitab.id}/isi`,
    `${API_URL}/${kitab.slug}/isi`
  ];

  let teks = null;
  for(let url of endpoints){
    try{
      const res = await fetch(url,{
        headers:{'X-API-Key':apiKey,'accept':'application/json'},
        signal: AbortSignal.timeout(10000) // timeout 10 detik
      });
      if(res.ok){
        const detail = await res.json();
        teks = detail.data?.teks || detail.data?.isi || detail.teks || detail.isi || detail.content;
        if(teks) break;
      }
    }catch(e){}
  }

  if(teks){
    modalBody.innerHTML = `
      <h2 style="font-family:Amiri;font-size:28px;color:var(--accent);margin-bottom:10px">
        ${kitab.nama}
      </h2>
      <p style="font-size:20px;font-family:Amiri;text-align:right;direction:rtl;color:var(--accent2);margin-bottom:8px">
        ${kitab.nama_arab}
      </p>
      <p style="color:var(--muted);margin-bottom:20px">
        ✍️ ${kitab.pengarang} • ${kitab.mazhab}
      </p>
      <div class="arabic">${teks}</div>
    `;
  }else{
    modalBody.innerHTML += '<div class="error">Gagal memuat isi kitab. Cek koneksi internet.</div>';
  }
}

function closeModal(e){
  if(!e || e.target.id === 'modal'){
    document.getElementById('modal').classList.remove('active');
  }
}

function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark'? '' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kitab_theme', next);
}

if(localStorage.getItem('kitab_theme') === 'dark'){
  document.documentElement.setAttribute('data-theme','dark');
}

document.getElementById('searchInput').addEventListener('keypress', e => {
  if(e.key === 'Enter') loadKitab();
});
</script>

</body>
</html>
