<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiblat 7 Tema</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    transition: all 0.5s ease;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }

  /* 7 TEMA */
  body.theme-dark { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); color: #fff; }
  body.theme-gold { background: radial-gradient(circle, #451a03 0%, #1c1917 100%); color: #fef3c7; }
  body.theme-ocean { background: radial-gradient(circle, #0c4a6e 0%, #082f49 100%); color: #e0f2fe; }
  body.theme-forest { background: radial-gradient(circle, #14532d 0%, #052e16 100%); color: #dcfce7; }
  body.theme-neon { background: radial-gradient(circle, #2e1065 0%, #1e1b4b 100%); color: #f5d0fe; }
  body.theme-sunset { background: radial-gradient(circle, #7c2d12 0%, #431407 100%); color: #fed7aa; }
  body.theme-minimal { background: #fafafa; color: #1e293b; }

  h2 { margin-bottom: 10px; text-shadow: 0 0 20px currentColor; }

 .compass-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 30px 0;
    filter: drop-shadow(0 0 30px currentColor);
  }

 .compass-bg,.needle {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

 .needle {
    transform-origin: center;
    transform: rotate(0deg);
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

 .info {
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 350px;
    border: 1px solid currentColor;
    background: rgba(255,255,255,0.1);
  }

 .degree {
    font-size: 52px;
    font-weight: bold;
    text-shadow: 0 0 20px currentColor;
    margin: 10px 0;
  }

  button, select {
    margin-top: 15px;
    padding: 12px 30px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    background: currentColor;
    color: #0f172a;
    transition: 0.3s;
  }

  button:hover, select:hover { transform: translateY(-2px); }

 .theme-select {
    margin-bottom: 20px;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid currentColor;
    background: transparent;
    color: inherit;
    font-size: 15px;
  }

 .beep-active {
    animation: pulse 0.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
</style>
</head>
<body class="theme-dark">

<select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
  <option value="theme-dark">🌙 Dark Green</option>
  <option value="theme-gold">✨ Gold Islamic</option>
  <option value="theme-ocean">🌊 Ocean Blue</option>
  <option value="theme-forest">🌿 Forest Green</option>
  <option value="theme-neon">💜 Neon Purple</option>
  <option value="theme-sunset">🌅 Sunset Orange</option>
  <option value="theme-minimal">⚪ Minimal Light</option>
</select>

<h2>🧭 Arah Kiblat</h2>

<div class="compass-wrap" id="compassWrap">
  <svg class="compass-bg" id="compassSvg" viewBox="0 0 320 320"></svg>
  <svg class="needle" id="needle" viewBox="0 0 320 320"></svg>
</div>

<div class="info" id="infoBox">
  <div id="status" class="loading">Mencari lokasi...</div>
  <div class="degree" id="degree">--°</div>
  <div id="location" style="font-size:14px;opacity:0.7;"></div>
</div>

<button id="btn" onclick="getQibla()">Refresh</button>

<script>
const themes = {
  'theme-dark': { main: '#22c55e', accent: '#4ade80', bg1: '#1e293b', bg2: '#0f172a' },
  'theme-gold': { main: '#fbbf24', accent: '#fcd34d', bg1: '#451a03', bg2: '#1c1917' },
  'theme-ocean': { main: '#38bdf8', accent: '#7dd3fc', bg1: '#0c4a6e', bg2: '#082f49' },
  'theme-forest': { main: '#4ade80', accent: '#86efac', bg1: '#14532d', bg2: '#052e16' },
  'theme-neon': { main: '#c084fc', accent: '#e9d5ff', bg1: '#2e1065', bg2: '#1e1b4b' },
  'theme-sunset': { main: '#fb923c', accent: '#fdba74', bg1: '#7c2d12', bg2: '#431407' },
  'theme-minimal': { main: '#334155', accent: '#64748b', bg1: '#fafafa', bg2: '#e2e8f0' }
};

let currentTheme = 'theme-dark';
let audioCtx;
let beepPlaying = false;
let lastQibla = 0;

function changeTheme(theme) {
  document.body.className = theme;
  currentTheme = theme;
  drawCompass();
}

function drawCompass() {
  const t = themes[currentTheme];
  const compassSvg = document.getElementById('compassSvg');
  const needleSvg = document.getElementById('needle');

  compassSvg.innerHTML = `
    <defs>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${t.bg1}"/>
        <stop offset="100%" stop-color="${t.bg2}"/>
      </radialGradient>
    </defs>
    <circle cx="160" cy="160" r="150" fill="url(#glow)" stroke="${t.main}" stroke-width="2"/>
    <circle cx="160" cy="160" r="120" fill="none" stroke="${t.main}" stroke-width="1" opacity="0.3"/>
    <g stroke="${t.main}" stroke-width="2" opacity="0.6">
      <line x1="160" y1="20" x2="160" y2="40"/>
      <line x1="160" y1="280" x2="160" y2="300"/>
      <line x1="20" y1="160" x2="40" y2="160"/>
      <line x1="280" y1="160" x2="300" y2="160"/>
    </g>
    <text x="160" y="35" fill="${t.accent}" font-size="20" font-weight="bold" text-anchor="middle">N</text>
    <text x="285" y="165" fill="${t.main}" font-size="16" text-anchor="middle">E</text>
    <text x="160" y="295" fill="${t.main}" font-size="16" text-anchor="middle">S</text>
    <text x="35" y="165" fill="${t.main}" font-size="16" text-anchor="middle">W</text>
    <circle cx="160" cy="160" r="8" fill="${t.main}"/>
    <circle cx="160" cy="160" r="4" fill="${t.bg2}"/>
  `;

  needleSvg.innerHTML = `
    <defs>
      <linearGradient id="needleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${currentTheme==='theme-minimal'?'#ef4444':'#ff4444'}"/>
        <stop offset="50%" stop-color="${currentTheme==='theme-minimal'?'#ef4444':'#ff4444'}"/>
        <stop offset="50%" stop-color="${t.main}"/>
        <stop offset="100%" stop-color="${t.main}"/>
      </linearGradient>
    </defs>
    <polygon points="160,40 170,160 160,280 150,160" fill="url(#needleGrad)"/>
    <circle cx="160" cy="160" r="6" fill="${t.main}"/>
  `;
}

function playBeep() {
  if (beepPlaying) return;
  beepPlaying = true;

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);

  document.getElementById('compassWrap').classList.add('beep-active');
  setTimeout(() => {
    beepPlaying = false;
    document.getElementById('compassWrap').classList.remove('beep-active');
  }, 1000);
}

async function getQibla() {
  const btn = document.getElementById('btn');
  const statusEl = document.getElementById('status');
  const degreeEl = document.getElementById('degree');
  const locationEl = document.getElementById('location');
  const needle = document.getElementById('needle');

  btn.disabled = true;
  statusEl.textContent = 'Mencari lokasi...';

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    locationEl.textContent = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
    statusEl.textContent = 'Mengambil data kiblat...';

    try {
      const res = await fetch(`https://api.myquran.com/v3/qibla/${lat}/${lon}`);
      const data = await res.json();

      if (data.status && data.data) {
        const qiblaDeg = parseFloat(data.data.qibla);
        lastQibla = qiblaDeg;
        degreeEl.textContent = `${qiblaDeg}°`;
        needle.style.transform = `rotate(${qiblaDeg}deg)`;
        statusEl.textContent = 'Putar HP sampai jarum ke atas';

        // Cek kalau arah pas ±3 derajat
        if (window.deviceorientation) {
          // Nanti cek pakai sensor
        }
      } else {
        statusEl.textContent = 'Gagal ambil data';
      }
    } catch (e) {
      statusEl.textContent = 'Koneksi error';
    }

    btn.disabled = false;
  }, (err) => {
    statusEl.textContent = 'Izin lokasi ditolak';
    btn.disabled = false;
  });
}

// Cek arah pakai sensor kompas HP
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', (event) => {
    if (event.alpha!== null) {
      const heading = 360 - event.alpha;
      const diff = Math.abs(heading - lastQibla);
      const diffNorm = Math.min(diff, 360 - diff);

      if (diffNorm < 3 && lastQibla > 0) {
        playBeep();
        document.getElementById('status').textContent = '✅ Arah kiblat sudah pas!';
      }
    }
  });
}

drawCompass();
getQibla();
</script>

</body>
</html>
