<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensiklopedia Hadist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #F4ECD8; --parchment-dark: #E8D9B8; --ink: #1C1208; --ink-medium: #3D2B10;
  --ink-light: #6B4E27; --ink-faint: #A07840; --rust: #8B3A1A; --emerald: #1A4D3A;
  --border: #C4A96A; --border-light: #DCC890;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #2A1F0E; font-family: 'Lora', serif; color: var(--ink); }
.masthead { background: var(--parchment); border-bottom: 3px double var(--border); text-align: center; padding: 20px; }
.masthead-arabic { font-family: 'Amiri', serif; font-size: 2rem; color: var(--rust); direction: rtl; }
.masthead-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; }
.page-wrap { display: flex; min-height: calc(100vh - 140px); }
.sidebar {
  width: 280px; background: var(--parchment-dark); border-right: 2px solid var(--border);
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-header { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
.sidebar-title { font-family: 'Playfair Display', serif; font-weight: 600; }
.collection-item {
  padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(196,169,106,0.2);
}
.collection-item:hover { background: rgba(139,58,26,0.07); }
.collection-item.active { background: var(--rust); color: var(--parchment); }
.col-name { font-weight: 600; }
.col-arabic { font-family: 'Amiri', serif; direction: rtl; font-size: 0.9rem; opacity: 0.8; }
.main { flex: 1; background: var(--parchment); padding: 36px 48px; }
.col-page-header { margin-bottom: 32px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
.col-page-arabic { font-family: 'Amiri', serif; font-size: 2rem; color: var(--rust); direction: rtl; }
.col-page-name { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; }
.hadith-card {
  background: white; border: 1px solid var(--border-light); border-top: 3px solid var(--rust);
  margin-bottom: 24px; padding: 20px;
}
.hadith-number { font-weight: 700; color: var(--rust); margin-bottom: 10px; }
.hadith-arabic {
  font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2; direction: rtl; text-align: right;
  margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--border-light);
}
.hadith-translation { font-size: 0.97rem; line-height: 1.85; }
.hadith-narrator { margin-top: 14px; font-style: italic; color: var(--ink-light); font-size: 0.85rem; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 36px; flex-wrap: wrap; }
.page-btn {
  padding: 8px 18px; background: white; border: 1px solid var(--border); cursor: pointer;
}
.page-btn:hover:not(:disabled) { background: var(--rust); color: white; }
.page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.page-btn.active { background: var(--ink); color: var(--parchment); }
.loading { text-align: center; padding: 60px; font-style: italic; }
.error-box { padding: 24px; background: #FFF5F0; border-left: 4px solid var(--rust); margin: 24px 0; color: var(--rust); }
@media (max-width: 768px) {
  .page-wrap { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: relative; max-height: 300px; }
  .main { padding: 20px; }
}
</style>
</head>
<body>

<header class="masthead">
  <span class="masthead-arabic">الحَدِيثُ النَّبَوِيُّ الشَّرِيف</span>
  <div class="masthead-title">Ensiklopedia Hadist</div>
</header>

<div class="page-wrap">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Kitab Hadist</div>
    </div>
    <div class="collection-list" id="collectionList">
      <div class="loading">Memuat kitab...</div>
    </div>
  </aside>

  <main class="main">
    <div class="content-area" id="contentArea">
      <div class="loading">Pilih kitab di samping untuk mulai membaca hadist</div>
    </div>
  </main>
</div>

<script>
const API_BASE = 'https://api.hadith.gading.dev';

let state = {
  collections: [],
  currentCollection: null,
  page: 1,
  perPage: 20,
};

async function init() {
  try {
    const res = await fetch(`${API_BASE}/books`);
    const data = await res.json();
    state.collections = data.data || [];
    renderCollectionList(state.collections);
  } catch(e) {
    document.getElementById('collectionList').innerHTML = '<div class="error-box">Gagal memuat daftar kitab</div>';
  }
}

function renderCollectionList(cols) {
  let html = '';
  cols.forEach(c => {
    html += `
      <div class="collection-item" onclick="selectCollection('${c.id}')" id="col-${c.id}">
        <div class="col-name">${c.name}</div>
        <div class="col-arabic">${c.arab || ''}</div>
        <div style="font-size:0.8rem; opacity:0.7;">${c.available} hadist</div>
      </div>
    `;
  });
  document.getElementById('collectionList').innerHTML = html;
}

async function selectCollection(id) {
  const col = state.collections.find(c => c.id === id);
  state.currentCollection = col;
  state.page = 1;

  document.querySelectorAll('.collection-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`col-${id}`).classList.add('active');

  await loadHadiths(id, 1);
}

async function loadHadiths(colId, page) {
  const col = state.collections.find(c => c.id === colId);
  state.currentCollection = col;
  state.page = page;
  document.getElementById('contentArea').innerHTML = '<div class="loading">Memuat hadist...</div>';

  try {
    const start = (page - 1) * state.perPage + 1;
    const end = start + state.perPage - 1;
    const url = `${API_BASE}/books/${colId}?range=${start}-${end}`;
    
    const res = await fetch(url);
    const data = await res.json();

    const hadiths = data.data.hadiths;
    
    if (!hadiths || !Array.isArray(hadiths) || hadiths.length === 0) {
      throw new Error('Hadist tidak ditemukan');
    }

    const total = data.data.available;
    const lastPage = Math.ceil(total / state.perPage);

    renderHadithsView(col, hadiths, page, lastPage);
  } catch(e) {
    document.getElementById('contentArea').innerHTML = `
      <div class="error-box">
        Gagal memuat hadist.<br>
        <small>Error: ${e.message}</small>
      </div>
    `;
  }
}

function renderHadithsView(col, hadiths, page, lastPage) {
  let html = `
    <div class="col-page-header">
      <span class="col-page-arabic">${col.arab}</span>
      <div class="col-page-name">${col.name}</div>
    </div>
  `;

  hadiths.forEach(h => {
    html += `
      <div class="hadith-card">
        <div class="hadith-number">Hadist No. ${h.number}</div>
        <div class="hadith-arabic">${h.arab}</div>
        <div class="hadith-translation">${h.id}</div>
        <div class="hadith-narrator">Perawi: ${h.name}</div>
      </div>
    `;
  });

  html += `<div class="pagination">`;
  html += `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="loadHadiths('${col.id}', ${page - 1})">← Sebelumnya</button>`;

  const start = Math.max(1, page - 2);
  const end = Math.min(lastPage, page + 2);
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadHadiths('${col.id}', ${i})">${i}</button>`;
  }

  html += `<button class="page-btn" ${page >= lastPage ? 'disabled' : ''} onclick="loadHadiths('${col.id}', ${page + 1})">Berikutnya →</button>`;
  html += `</div>`;

  document.getElementById('contentArea').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
</body>
</html>
