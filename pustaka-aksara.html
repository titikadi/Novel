<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Pustaka Aksara — Baca Cerita</title>

<style>
/* ============================= TOKENS ============================= */
:root{
  --ink:#121c26;
  --ink-2:#1b2733;
  --ink-3:#28394a;
  --ink-border:rgba(199,154,75,0.16);
  --parchment:#f7efdd;
  --parchment-shadow:#dfcb9c;
  --text-ink:#2c2115;
  --text-ink-soft:#5b4d38;
  --brass:#c89a4d;
  --brass-light:#e7c688;
  --brass-dark:#9c7635;
  --maroon:#8a3324;
  --success:#4a7a5c;
  --danger:#c0584a;
  --font-display:'Fraunces', serif;
  --font-body:'Literata', serif;
  --font-ui:'Inter', sans-serif;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top, rgba(199,154,75,0.07), transparent 60%),
    var(--ink);
  color:#e9e2d3;
  font-family:var(--font-ui);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;}
button{font-family:var(--font-ui);cursor:pointer;}
input,textarea,select{font-family:var(--font-ui);}
::selection{background:var(--brass);color:var(--ink);}
.muted{color:#a99c84;}
.hide{display:none !important;}
.scrollbar-thin{scrollbar-width:thin;scrollbar-color:var(--brass-dark) transparent;}
.scrollbar-thin::-webkit-scrollbar{width:6px;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--brass-dark);border-radius:3px;}

/* ============================= NAVBAR ============================= */
#navbar{
  position:sticky;top:0;z-index:50;
  background:rgba(18,28,38,0.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--ink-border);
}
.nav-inner{
  max-width:1100px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;gap:18px;
}
.brand{
  font-family:var(--font-display);font-weight:700;font-size:1.35rem;
  color:var(--brass-light);letter-spacing:0.01em;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.brand .dot{color:var(--maroon);}
.nav-search{flex:1;min-width:0;}
.nav-search input{
  width:100%;background:var(--ink-2);border:1px solid var(--ink-border);
  border-radius:999px;padding:9px 16px;color:#e9e2d3;font-size:0.92rem;outline:none;
}
.nav-search input::placeholder{color:#8a7f6a;}
.nav-search input:focus{border-color:var(--brass-dark);}
.nav-links{display:flex;align-items:center;gap:10px;white-space:nowrap;}
.nav-links .nav-link{
  font-size:0.88rem;color:#c9bea6;padding:7px 12px;border-radius:8px;transition:background .15s;
}
.nav-links .nav-link:hover{background:var(--ink-2);}
.nav-links .nav-link.active{color:var(--brass-light);}
.nav-user{font-size:0.82rem;color:#a99c84;}
@media (max-width:700px){
  .nav-inner{flex-wrap:wrap;}
  .nav-search{order:3;flex:1 1 100%;}
}

/* ============================= LAYOUT ============================= */
#app{max-width:1100px;margin:0 auto;padding:28px 20px 80px;min-height:70vh;}
.section-eyebrow{
  font-family:var(--font-ui);font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--brass);margin:0 0 6px;font-weight:600;
}
.hero{padding:34px 0 26px;text-align:center;}
.hero h1{
  font-family:var(--font-display);font-weight:600;font-size:2.4rem;margin:0 0 10px;
  color:#f3ecdc;letter-spacing:0.005em;
}
.hero p{color:#a99c84;font-size:1rem;max-width:480px;margin:0 auto;}

/* ============================= BUTTONS ============================= */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:9px;padding:10px 18px;font-size:0.88rem;font-weight:600;
  transition:transform .12s, filter .12s; white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-brass{background:linear-gradient(160deg,var(--brass-light),var(--brass-dark));color:#1a1305;}
.btn-brass:hover{filter:brightness(1.07);}
.btn-ghost{background:var(--ink-2);color:#e9e2d3;border:1px solid var(--ink-border);}
.btn-ghost:hover{background:var(--ink-3);}
.btn-danger{background:rgba(192,88,74,0.15);color:#e89a8c;border:1px solid rgba(192,88,74,0.4);}
.btn-danger:hover{background:rgba(192,88,74,0.25);}
.btn-sm{padding:6px 12px;font-size:0.78rem;}
.btn-block{width:100%;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ============================= FIELDS ============================= */
.field-group{margin-bottom:14px;}
.field-label{display:block;font-size:0.78rem;color:#a99c84;margin-bottom:6px;font-weight:600;}
.field{
  width:100%;background:var(--ink-2);border:1px solid var(--ink-border);border-radius:9px;
  padding:10px 13px;color:#e9e2d3;font-size:0.92rem;outline:none;resize:vertical;
}
.field:focus{border-color:var(--brass-dark);}
.field-hint{font-size:0.74rem;color:#897c64;margin-top:4px;}
.field-row{display:flex;gap:12px;flex-wrap:wrap;}
.field-row > *{flex:1;min-width:160px;}

/* ============================= CARDS / GRID ============================= */
.story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:20px;margin-top:18px;}
.story-card{
  background:var(--ink-2);border:1px solid var(--ink-border);border-radius:var(--radius);
  overflow:hidden;transition:transform .18s, box-shadow .18s;display:flex;flex-direction:column;
}
.story-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,0.35);}
.cover{
  height:150px;position:relative;display:flex;align-items:flex-end;padding:14px;
  font-family:var(--font-display);font-weight:600;font-size:1.05rem;color:#f3ecdc;
  box-shadow:inset 6px 0 14px -10px rgba(0,0,0,0.6);
}
.cover .badge-genre{
  position:absolute;top:10px;left:10px;font-family:var(--font-ui);font-size:0.66rem;
  background:rgba(0,0,0,0.35);padding:3px 8px;border-radius:999px;letter-spacing:0.04em;
  text-transform:uppercase;color:#f1e6c8;
}
.card-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:6px;flex:1;}
.card-author{font-size:0.78rem;color:#a99c84;}
.card-stats{display:flex;gap:10px;font-size:0.72rem;color:#897c64;margin-top:auto;}
.badge{font-size:0.68rem;padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:0.02em;}
.badge-free{background:rgba(74,122,92,0.18);color:#8fd3a8;}
.badge-premium{background:rgba(199,154,75,0.18);color:var(--brass-light);}
.badge-draft{background:rgba(192,88,74,0.18);color:#e89a8c;}

/* ============================= EMPTY / LOADING ============================= */
.empty-state{
  text-align:center;padding:50px 20px;color:#897c64;border:1px dashed var(--ink-border);
  border-radius:var(--radius);margin-top:18px;
}
.empty-state h3{font-family:var(--font-display);color:#cfc4ab;margin:0 0 6px;font-weight:600;}
.spinner{
  width:26px;height:26px;border-radius:50%;border:3px solid var(--ink-3);border-top-color:var(--brass);
  animation:spin 0.8s linear infinite;margin:40px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============================= STORY DETAIL ============================= */
.detail-hero{
  background:var(--ink-2);border:1px solid var(--ink-border);border-radius:var(--radius);
  padding:28px;margin-bottom:24px;
}
.detail-hero h1{font-family:var(--font-display);font-size:1.9rem;font-weight:600;margin:6px 0 10px;color:#f3ecdc;}
.detail-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:0.82rem;color:#a99c84;margin-bottom:14px;}
.detail-synopsis{color:#cfc4ab;line-height:1.7;font-size:0.94rem;max-width:680px;}
.toc-list{display:flex;flex-direction:column;gap:8px;}
.toc-item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--ink-2);border:1px solid var(--ink-border);border-radius:11px;
  padding:14px 16px;transition:border-color .15s, transform .12s;
}
.toc-item:hover{border-color:var(--brass-dark);transform:translateX(2px);}
.toc-left{display:flex;flex-direction:column;gap:3px;min-width:0;}
.toc-eyebrow{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--brass);font-weight:600;}
.toc-title{font-family:var(--font-display);font-size:1.02rem;color:#f0e9d8;}
.toc-sub{font-size:0.74rem;color:#897c64;}
.toc-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}

/* ============================= READER ============================= */
.reader-shell{display:flex;flex-direction:column;align-items:center;}
.reader-top{
  width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:16px;font-size:0.82rem;color:#a99c84;flex-wrap:wrap;
}
.reader-top .rt-title{font-family:var(--font-display);color:#e9e2d3;font-size:0.98rem;}
.page-stage{position:relative;width:100%;max-width:720px;}
.page-paper{
  background:var(--parchment);
  color:var(--text-ink);
  border-radius:10px;
  min-height:62vh;
  padding:42px 46px;
  position:relative;
  box-shadow:
    0 2px 0 var(--parchment-shadow),
    0 8px 0 -2px rgba(0,0,0,0.12),
    0 22px 40px -10px rgba(0,0,0,0.55),
    6px 6px 0 -2px var(--parchment-shadow),
    10px 10px 0 -4px rgba(223,203,156,0.55);
  transition:opacity .22s ease, transform .22s ease;
  overflow-y:auto;
  max-height:78vh;
}
.page-paper.turning{opacity:0;transform:translateX(14px) scale(0.99);}
.page-text{font-family:var(--font-body);font-size:1.06rem;line-height:1.85;}
.page-text p{margin:0 0 1.05em;}
.page-text.first-page p:first-of-type::first-letter{
  font-family:var(--font-display);font-size:3.2em;line-height:0.78;float:left;
  padding:0.04em 0.08em 0 0;color:var(--brass-dark);font-weight:700;
}
.page-chapter-title{
  font-family:var(--font-display);font-weight:600;font-size:1.5rem;margin:0 0 22px;
  color:var(--text-ink);text-align:center;
}
.tap-zone{position:absolute;top:0;bottom:0;width:18%;z-index:2;cursor:pointer;}
.tap-zone.left{left:0;}
.tap-zone.right{right:0;}
.page-controls{
  width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;
  margin-top:16px;gap:14px;
}
.page-arrow{
  width:42px;height:42px;border-radius:50%;background:var(--ink-2);border:1px solid var(--ink-border);
  display:flex;align-items:center;justify-content:center;color:var(--brass-light);font-size:1.1rem;
  flex-shrink:0;transition:background .15s;
}
.page-arrow:hover{background:var(--ink-3);}
.page-arrow:disabled{opacity:0.3;cursor:not-allowed;}
.page-progress-track{flex:1;height:3px;background:var(--ink-3);border-radius:3px;position:relative;overflow:hidden;}
.page-progress-fill{height:100%;background:linear-gradient(90deg,var(--brass-dark),var(--brass-light));border-radius:3px;}
.page-progress-label{font-size:0.76rem;color:#897c64;white-space:nowrap;}

/* ============================= PAYWALL ============================= */
.paywall-card{
  background:var(--parchment);color:var(--text-ink);border-radius:10px;min-height:62vh;
  padding:48px 36px;text-align:center;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;
  box-shadow:0 2px 0 var(--parchment-shadow),0 22px 40px -10px rgba(0,0,0,0.55),
    6px 6px 0 -2px var(--parchment-shadow),10px 10px 0 -4px rgba(223,203,156,0.55);
}
.seal{
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 55%, var(--brass-dark) 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.3), inset 0 2px 4px rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:center;
}
.paywall-card h2{font-family:var(--font-display);font-size:1.4rem;margin:4px 0 0;font-weight:600;}
.paywall-price{font-family:var(--font-display);font-size:2.1rem;font-weight:700;color:var(--brass-dark);margin:2px 0;}
.paywall-card p{color:var(--text-ink-soft);font-size:0.9rem;max-width:380px;line-height:1.6;margin:0;}
.pay-info{
  background:rgba(140,110,60,0.08);border:1px dashed var(--brass-dark);border-radius:10px;
  padding:14px 18px;text-align:left;width:100%;max-width:340px;font-size:0.88rem;margin-top:6px;
}
.pay-info-row{display:flex;justify-content:space-between;padding:4px 0;}
.pay-info-row b{font-family:var(--font-ui);}
.pending-note{
  background:rgba(74,122,92,0.12);border:1px solid var(--success);color:#2f5a40;
  border-radius:9px;padding:10px 16px;font-size:0.85rem;font-weight:600;
}

/* ============================= ADMIN ============================= */
.admin-tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--ink-border);flex-wrap:wrap;}
.admin-tab{padding:10px 16px;font-size:0.86rem;color:#a99c84;border-bottom:2px solid transparent;}
.admin-tab.active{color:var(--brass-light);border-color:var(--brass);}
.panel{background:var(--ink-2);border:1px solid var(--ink-border);border-radius:var(--radius);padding:22px;}
.admin-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 0;border-bottom:1px solid var(--ink-border);flex-wrap:wrap;
}
.admin-row:last-child{border-bottom:none;}
.admin-row-title{font-family:var(--font-display);color:#f0e9d8;font-size:1rem;}
.admin-row-sub{font-size:0.76rem;color:#897c64;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:22px;}
.stat-box{background:var(--ink-3);border-radius:11px;padding:16px;}
.stat-num{font-family:var(--font-display);font-size:1.5rem;color:var(--brass-light);font-weight:700;}
.stat-label{font-size:0.74rem;color:#a99c84;margin-top:2px;}
.swatch-row{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 16px;}
.swatch{
  width:38px;height:38px;border-radius:8px;border:2px solid transparent;cursor:pointer;
}
.swatch.selected{border-color:var(--brass-light);}

/* ============================= MODAL / TOAST ============================= */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,12,17,0.72);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-card{
  background:var(--ink-2);border:1px solid var(--ink-border);border-radius:var(--radius);
  padding:28px;width:100%;max-width:380px;
}
.modal-card h2{font-family:var(--font-display);margin:0 0 4px;color:#f3ecdc;font-size:1.3rem;}
.modal-tabs{display:flex;gap:6px;margin:14px 0 16px;}
.modal-tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:0.84rem;background:var(--ink-3);color:#a99c84;}
.modal-tab.active{background:var(--brass-dark);color:#1a1305;font-weight:600;}
.modal-error{color:#e89a8c;font-size:0.82rem;margin:4px 0 10px;min-height:1em;}
.modal-close{position:absolute;top:14px;right:18px;color:#897c64;font-size:1.2rem;background:none;border:none;}

#toast-container{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:var(--ink-2);border:1px solid var(--brass-dark);color:#f0e9d8;padding:11px 20px;
  border-radius:999px;font-size:0.85rem;box-shadow:0 8px 20px rgba(0,0,0,0.4);
  animation:toastIn .2s ease;
}
.toast.error{border-color:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media (max-width:700px){
  .page-paper{padding:28px 22px;min-height:68vh;max-height:80vh;}
  .detail-hero{padding:20px;}
  .hero h1{font-size:1.9rem;}
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc,
  updateDoc, deleteDoc, onSnapshot, query, where, orderBy,
  serverTimestamp, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =======================================================================
   KONFIGURASI — GANTI BAGIAN INI DENGAN MILIK ANDA
   1. Buat project di https://console.firebase.google.com
   2. Aktifkan Authentication > Sign-in method > Email/Password

   4. Salin Firebase config project Anda ke bawah ini
   5. Ganti ADMIN_EMAILS dengan email yang akan jadi admin (penulis cerita)
   ======================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDNoe_lN1jRKVxn7U3LDIetaKuEwG-4JB0",

};

/* =======================================================================
   ATURAN KEAMANAN FIRESTORE — tempel di Firebase Console > Firestore > Rules
   (disalin juga di pesan chat agar mudah copy-paste)
   ======================================================================= */

const PREMIUM_PRICE = 3000;
const WORDS_PER_PAGE = 2000;
const FREE_PAGES = 2; // halaman gratis di Bab 1

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const COVER_THEMES = {
  maroon:{label:"Merah Pualam", bg:"linear-gradient(160deg,#7a3530,#3d1414)"},
  forest:{label:"Hijau Hutan", bg:"linear-gradient(160deg,#33503f,#162720)"},
  navy:{label:"Biru Malam", bg:"linear-gradient(160deg,#2a4560,#11202f)"},
  plum:{label:"Ungu Plum", bg:"linear-gradient(160deg,#5e3759,#2a1429)"},
  ember:{label:"Jingga Bara", bg:"linear-gradient(160deg,#8c4e28,#3d2210)"},
  ink:{label:"Kelabu Tinta", bg:"linear-gradient(160deg,#2e3f50,#121c26)"}
};

const navbarEl = document.getElementById('navbar');
const appEl = document.getElementById('app');
const toastBox = document.getElementById('toast-container');

const state = {
  user:null,
  authReady:false,
  allStories:[],
  chaptersCache:{},      // storyId -> [{id,number,title,wordCount,pageCount}]
  contentCache:{},       // chapterId -> [pages]
  accessUnsub:null,
};

/* ============================= UTIL ============================= */
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function normalize(str){
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function countWords(text){
  return (text||'').trim().split(/\s+/).filter(Boolean).length;
}
function formatNumber(n){ return Math.max(0,n||0).toLocaleString('id-ID'); }
function formatRupiah(n){ return 'Rp ' + Math.max(0,n||0).toLocaleString('id-ID'); }
function formatDate(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
}
function isAdmin(){
  return !!(state.user && ADMIN_EMAILS.includes(state.user.email));
}
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.textContent = msg;
  toastBox.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
function splitIntoPages(text, wordsPerPage){
  const paragraphs = (text||'').split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean);
  if(paragraphs.length===0) return [];
  const pages = [];
  let current = [];
  let currentWords = 0;
  for(const p of paragraphs){
    const pWords = countWords(p);
    if(currentWords > 0 && (currentWords + pWords) > wordsPerPage * 1.15){
      pages.push(current.join('\n\n'));
      current = [p];
      currentWords = pWords;
    } else {
      current.push(p);
      currentWords += pWords;
    }
  }
  if(current.length) pages.push(current.join('\n\n'));
  return pages;
}
function renderPageHtml(pageText){

/* ============================= ROUTER ============================= */
function parseRoute(){
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/').filter(Boolean).map(decodeURIComponent);
  if(parts.length===0) return {view:'home'};
  if(parts[0]==='story' && parts[1]) return {view:'storyDetail', storyId:parts[1]};
  if(parts[0]==='read' && parts[1] && parts[2]!=null)
    return {view:'reader', storyId:parts[1], chapterNumber:parseInt(parts[2],10)||1, pageIndex:parseInt(parts[3]||'0',10)||0};
  if(parts[0]==='admin') return {view:'admin', tab:parts[1]||'stories', sub:parts[2]||null};
  if(parts[0]==='search') return {view:'home', q:parts[1]||''};
  return {view:'home'};
}

async function getChaptersMeta(storyId, force){

  const snap = await getDocs(q);
  const list = snap.docs.map(d=>({id:d.id, ...d.data()}));

async function addChapter(storyId, {number, title, content}){
  const pages = splitIntoPages(content, WORDS_PER_PAGE);
  const wordCount = countWords(content);
  const ref = await addDoc(collection(db,'stories',storyId,'chapters'), {
    number, title, wordCount, pageCount: pages.length,

  });
  await setDoc(doc(db,'stories',storyId,'chapters',ref.id,'content','main'), {pages});
  await updateDoc(doc(db,'stories',storyId), {
    chapterCount: increment(1), totalWords: increment(wordCount), updatedAt: serverTimestamp()
  });

async function editChapter(storyId, chapterId, oldWordCount, {number, title, content}){
  const pages = splitIntoPages(content, WORDS_PER_PAGE);
  const wordCount = countWords(content);
  await updateDoc(doc(db,'stories',storyId,'chapters',chapterId), {
    number, title, wordCount, pageCount: pages.length, updatedAt: serverTimestamp()
  });
  await setDoc(doc(db,'stories',storyId,'chapters',chapterId,'content','main'), {pages});
  await updateDoc(doc(db,'stories',storyId), {
    totalWords: increment(wordCount - oldWordCount), updatedAt: serverTimestamp()
  });
  delete state.chaptersCache[storyId];
  delete state.contentCache[chapterId];
}

/* ============================= AUTH MODAL ============================= */
function openAuthModal(mode, onSuccess){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card" style="position:relative;">
      <button class="modal-close" id="authClose">&times;</button>
      <h2>${mode==='login' ? 'Masuk' : 'Buat Akun'}</h2>
      <p class="muted" style="font-size:0.82rem;margin:4px 0 0;">Untuk membaca cerita premium, masuk dengan akun pembaca.</p>
      <div class="modal-tabs">
        <div class="modal-tab ${mode==='login'?'active':''}" data-mode="login">Masuk</div>
        <div class="modal-tab ${mode==='register'?'active':''}" data-mode="register">Daftar</div>
      </div>
      <div class="modal-error" id="authError"></div>
      <div class="field-group"><label class="field-label">Email</label><input class="field" id="authEmail" type="email" placeholder="nama@email.com" /></div>
      <div class="field-group"><label class="field-label">Sandi</label><input class="field" id="authPass" type="password" placeholder="Minimal 6 karakter" /></div>
      <button class="btn btn-brass btn-block" id="authSubmit">${mode==='login' ? 'Masuk' : 'Daftar'}</button>
    </div>`;
  document.body.appendChild(overlay);
  let currentMode = mode;
  function setMode(m){
    currentMode = m;
    overlay.querySelectorAll('.modal-tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===m));
    overlay.querySelector('h2').textContent = m==='login' ? 'Masuk' : 'Buat Akun';
    overlay.querySelector('#authSubmit').textContent = m==='login' ? 'Masuk' : 'Daftar';
  }
  overlay.querySelectorAll('.modal-tab').forEach(t=>t.addEventListener('click', ()=>setMode(t.dataset.mode)));
  overlay.querySelector('#authClose').addEventListener('click', ()=>overlay.remove());
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#authSubmit').addEventListener('click', async ()=>{
    const email = overlay.querySelector('#authEmail').value.trim();
    const pass = overlay.querySelector('#authPass').value;
    const errBox = overlay.querySelector('#authError');
    errBox.textContent = '';
    if(!email || !pass){ errBox.textContent = 'Email dan sandi wajib diisi.'; return; }
    try{
      if(currentMode==='login') await doLogin(email, pass);
      else await doRegister(email, pass);
      overlay.remove();
      toast(currentMode==='login' ? 'Berhasil masuk.' : 'Akun berhasil dibuat.');
      if(onSuccess) onSuccess();
      else renderAll();
    }catch(err){
      errBox.textContent = mapAuthError(err.code);
    }
  });
}
function mapAuthError(code){
  const map = {
    'auth/email-already-in-use':'Email ini sudah terdaftar. Coba masuk.',
    'auth/invalid-email':'Format email tidak valid.',
    'auth/weak-password':'Sandi minimal 6 karakter.',
    'auth/invalid-credential':'Email atau sandi salah.',
    'auth/user-not-found':'Email atau sandi salah.',
    'auth/wrong-password':'Email atau sandi salah.',
    'auth/too-many-requests':'Terlalu banyak percobaan. Coba lagi nanti.'
  };
  return map[code] || 'Terjadi kesalahan. Coba lagi.';
}

function searchStories(list, qRaw){
  const q = normalize(qRaw);
  const published = list.filter(s=> s.status==='published' || isAdmin());
  if(!q) return published;
  return published.map(s=>{
    const title = normalize(s.title), genre = normalize(s.genre), author = normalize(s.author), syn = normalize(s.synopsis);
    let score = -1;
    if(title===q) score = 100;
    else if(title.startsWith(q)) score = 90;
    else if(title.includes(q)) score = 70;
    else if(genre.includes(q)) score = 55;
    else if(author.includes(q)) score = 45;
    else if(syn.includes(q)) score = 20;
    return {...s, _score:score};
  }).filter(s=>s._score>=0).sort((a,b)=>b._score-a._score);
}

/* ============================= READER VIEW ============================= */
function isLockedFor(chapterNumber, pageIndex, accessApproved){
  if(isAdmin()) return false;
  if(accessApproved) return false;
  if(chapterNumber===1 && pageIndex < FREE_PAGES) return false;
  return true;
}
async function renderReader(params){
  if(state.accessUnsub){ state.accessUnsub(); state.accessUnsub = null; }
  appEl.innerHTML = `<div class="spinner"></div>`;
  const {storyId, chapterNumber} = params;
  let pageIndex = params.pageIndex || 0;

  const storySnap = await getDoc(doc(db,'stories',storyId));
  if(!storySnap.exists()){ appEl.innerHTML = `<div class="empty-state"><h3>Cerita tidak ditemukan</h3></div>`; return; }
  const story = {id:storyId, ...storySnap.data()};
  const chapters = await getChaptersMeta(storyId);
  if(chapters.length===0){ appEl.innerHTML = `<div class="empty-state"><h3>Belum ada bab untuk dibaca</h3></div>`; return; }
  const chapter = chapters.find(c=>c.number===chapterNumber) || chapters[0];
  const pages = await getChapterContent(storyId, chapter.id);
  if(pages.length===0){ appEl.innerHTML = `<div class="empty-state"><h3>Bab ini belum memiliki isi</h3></div>`; return; }
  pageIndex = Math.min(Math.max(pageIndex,0), pages.length-1);

  let accessApproved = false;
  let accessId = null;
  let accessPending = false;
  if(state.user){
    accessId = `${state.user.uid}_${storyId}`;
    const accSnap = await getDoc(doc(db,'access', accessId));
    if(accSnap.exists()){ accessApproved = !!accSnap.data().approved; accessPending = !accSnap.data().approved; }
  }

  const locked = isLockedFor(chapter.number, pageIndex, accessApproved);

  if(locked && state.user && !accessApproved){
    state.accessUnsub = onSnapshot(doc(db,'access', accessId), snap=>{
      if(snap.exists() && snap.data().approved){
        toast('Premium dikonfirmasi! Selamat membaca.');
        renderReader(params);
      }
    });
  }

  const chapterIndexInList = chapters.findIndex(c=>c.id===chapter.id);
  const hasPrevPage = pageIndex > 0 || chapterIndexInList > 0;
  const hasNextPage = pageIndex < pages.length-1 || chapterIndexInList < chapters.length-1;

  appEl.innerHTML = `
    <div class="reader-shell">
      <div class="reader-top">
        <a href="#/story/${story.id}" class="muted">&larr; ${escapeHtml(story.title)}</a>
        <div class="rt-title">Bab ${chapter.number} · ${escapeHtml(chapter.title)}</div>
      </div>
      <div class="page-stage">
        <div class="page-paper scrollbar-thin" id="pagePaper">
          ${ locked ? paywallHtml(story, accessPending) : `
            ${pageIndex===0 ? `<div class="page-chapter-title">Bab ${chapter.number}<br>${escapeHtml(chapter.title)}</div>` : ''}
            <div class="page-text ${pageIndex===0 ? 'first-page' : ''}">${renderPageHtml(pages[pageIndex])}</div>
          `}
          ${ !locked ? `<div class="tap-zone left" id="tapPrev"></div><div class="tap-zone right" id="tapNext"></div>` : '' }
        </div>
      </div>
      <div class="page-controls">
        <button class="page-arrow" id="prevBtn" ${!hasPrevPage ? 'disabled':''}>&larr;</button>
        <div class="page-progress-track"><div class="page-progress-fill" style="width:${((pageIndex+1)/pages.length*100).toFixed(1)}%;"></div></div>
        <div class="page-progress-label">Halaman ${pageIndex+1}/${pages.length}</div>
        <button class="page-arrow" id="nextBtn" ${!hasNextPage ? 'disabled':''}>&rarr;</button>
      </div>
    </div>`;

  if(locked) bindPaywallEvents(story, accessId, accessPending);

  function step(dir){
    let newPageIdx = pageIndex + dir;
    let targetChapterNumber = chapter.number;
    if(newPageIdx < 0){
      if(chapterIndexInList>0){
        const prevCh = chapters[chapterIndexInList-1];
        go(`#/read/${storyId}/${prevCh.number}/${Math.max((prevCh.pageCount||1)-1,0)}`);
      }
      return;
    }
    if(newPageIdx > pages.length-1){
      if(chapterIndexInList < chapters.length-1){
        const nextCh = chapters[chapterIndexInList+1];
        go(`#/read/${storyId}/${nextCh.number}/0`);
      } else {
        toast('Anda sudah mencapai halaman terakhir cerita ini.');
      }
      return;
    }
    go(`#/read/${storyId}/${targetChapterNumber}/${newPageIdx}`);
  }
  document.getElementById('prevBtn').addEventListener('click', ()=>step(-1));
  document.getElementById('nextBtn').addEventListener('click', ()=>step(1));
  const tapPrev = document.getElementById('tapPrev');
  const tapNext = document.getElementById('tapNext');
  if(tapPrev) tapPrev.addEventListener('click', ()=>step(-1));
  if(tapNext) tapNext.addEventListener('click', ()=>step(1));

  function keyHandler(e){
    if(e.key==='ArrowRight') step(1);
    if(e.key==='ArrowLeft') step(-1);
  }
  document.addEventListener('keydown', keyHandler, {once:false});
  state._readerKeyHandler && document.removeEventListener('keydown', state._readerKeyHandler);
  state._readerKeyHandler = keyHandler;

  let touchStartX = null;
  const stage = document.querySelector('.page-stage');
  stage.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
  stage.addEventListener('touchend', e=>{
    if(touchStartX==null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 60){ step(dx < 0 ? 1 : -1); }
    touchStartX = null;
  }, {passive:true});
}

      actionBox.innerHTML = `
        <div class="field-group" style="text-align:left;">
          <label class="field-label">Nama pengirim / catatan transfer (opsional)</label>
          <input class="field" id="payNote" placeholder="Misal: transfer dari Gopay a.n. Budi" />
        </div>
        <button class="btn btn-brass btn-block" id="confirmPaidBtn">Kirim Konfirmasi</button>`;
      document.getElementById('confirmPaidBtn').addEventListener('click', async ()=>{
        const note = document.getElementById('payNote').value.trim();
        try{
          await requestPremiumAccess(story.id, story.title, note);
          toast('Konfirmasi dikirim. Menunggu persetujuan admin.');
          renderAll();
        }catch(err){ toast('Gagal mengirim konfirmasi.', 'error'); }
      });
    });
  }
}

/* ============================= ADMIN VIEW ============================= */
function renderAdmin(params){
  if(!isAdmin()){
    appEl.innerHTML = `<div class="empty-state"><h3>Khusus admin</h3><p>Halaman ini hanya bisa diakses oleh admin penulis cerita.</p></div>`;
    return;
  }
  const tab = params.tab || 'stories';
  const totalStories = state.allStories.length;
  const totalChapters = state.allStories.reduce((a,s)=>a+(s.chapterCount||0),0);
  const totalWords = state.allStories.reduce((a,s)=>a+(s.totalWords||0),0);

  appEl.innerHTML = `
    <div class="section-eyebrow">Panel Admin</div>
    <h1 style="font-family:var(--font-display);font-size:1.7rem;margin:4px 0 18px;color:#f3ecdc;">Kelola Pustaka</h1>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${formatNumber(totalStories)}</div><div class="stat-label">Cerita</div></div>
      <div class="stat-box"><div class="stat-num">${formatNumber(totalChapters)}</div><div class="stat-label">Bab</div></div>
      <div class="stat-box"><div class="stat-num">${formatNumber(totalWords)}</div><div class="stat-label">Total Kata</div></div>
    </div>
    <div class="admin-tabs">
      <a class="admin-tab ${tab==='stories'?'active':''}" href="#/admin/stories">Cerita</a>
      <a class="admin-tab ${tab==='requests'?'active':''}" href="#/admin/requests">Permintaan Premium</a>
      <a class="admin-tab ${tab==='settings'?'active':''}" href="#/admin/settings">Pengaturan Pembayaran</a>
    </div>
    <div id="adminPanelBody" class="panel"></div>
  `;
  const body = document.getElementById('adminPanelBody');
  if(tab==='stories') renderAdminStories(body, params.sub);
  else if(tab==='requests') renderAdminRequests(body);
  else if(tab==='settings') renderAdminSettings(body);
}

function renderAdminStories(body, sub){
  if(sub){
    renderAdminChapterManager(body, sub);
    return;
  }
  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="admin-row-title">Semua Cerita</div>
      <button class="btn btn-brass btn-sm" id="newStoryBtn">+ Cerita Baru</button>
    </div>
    <div id="storyFormHolder"></div>
    ${ state.allStories.length===0 ? `<div class="empty-state"><h3>Belum ada cerita</h3><p>Mulai dengan menambahkan cerita pertama Anda.</p></div>` :
      state.allStories.map(s=>`
        <div class="admin-row">
          <div>
            <div class="admin-row-title">${escapeHtml(s.title)} ${s.status==='draft' ? '<span class="badge badge-draft">Draf</span>' : '<span class="badge badge-free">Terbit</span>'}</div>
            <div class="admin-row-sub">${s.chapterCount||0} bab · ${formatNumber(s.totalWords)} kata · ${escapeHtml(s.genre||'-')}</div>
          </div>
          <div style="display:flex;gap:8px;">
            <a class="btn btn-ghost btn-sm" href="#/admin/stories/${s.id}">Kelola Bab</a>
            <button class="btn btn-ghost btn-sm" data-toggle="${s.id}">${s.status==='draft' ? 'Terbitkan' : 'Jadikan Draf'}</button>
            <button class="btn btn-danger btn-sm" data-delete="${s.id}">Hapus</button>
          </div>
        </div>
      `).join('')
    }
  `;
  document.getElementById('newStoryBtn').addEventListener('click', ()=>{
    const holder = document.getElementById('storyFormHolder');
    holder.innerHTML = newStoryFormHtml();
    bindNewStoryForm(holder);
  });
  body.querySelectorAll('[data-toggle]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.toggle;
      const s = state.allStories.find(x=>x.id===id);
      await updateStoryMeta(id, {status: s.status==='draft' ? 'published' : 'draft'});
      toast('Status cerita diperbarui.');
    });
  });
  body.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Hapus cerita ini beserta semua babnya? Tindakan ini tidak bisa dibatalkan.')) return;
      await deleteStoryFn(btn.dataset.delete);
      toast('Cerita dihapus.');
      renderAll();
    });
  });
}
function newStoryFormHtml(){
  const swatches = Object.entries(COVER_THEMES).map(([key,t])=>
    `<div class="swatch ${key==='ink'?'selected':''}" data-theme="${key}" title="${t.label}" style="background:${t.bg};"></div>`).join('');
  return `
    <div class="panel" style="margin-bottom:18px;background:var(--ink-3);">
      <div class="admin-row-title" style="margin-bottom:10px;">Cerita Baru</div>
      <div class="field-group"><label class="field-label">Judul</label><input class="field" id="nsTitle" /></div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Penulis</label><input class="field" id="nsAuthor" /></div>
        <div class="field-group"><label class="field-label">Genre</label><input class="field" id="nsGenre" placeholder="Misal: Romansa, Fantasi" /></div>
      </div>
      <div class="field-group"><label class="field-label">Sinopsis</label><textarea class="field" id="nsSynopsis" rows="3"></textarea></div>
      <div class="field-group">
        <label class="field-label">Warna sampul</label>
        <div class="swatch-row" id="nsSwatchRow">${swatches}</div>
      </div>
      <div class="field-group">
        <label class="field-label">Status</label>
        <select class="field" id="nsStatus">
          <option value="draft">Draf (belum tampil ke pembaca)</option>
          <option value="published">Terbit (tampil ke pembaca)</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-brass" id="nsSubmit">Simpan Cerita</button>
        <button class="btn btn-ghost" id="nsCancel">Batal</button>
      </div>
    </div>`;
}
function bindNewStoryForm(holder){
  let selectedTheme = 'ink';
  holder.querySelectorAll('.swatch').forEach(sw=>{
    sw.addEventListener('click', ()=>{
      holder.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedTheme = sw.dataset.theme;
    });
  });
  holder.querySelector('#nsCancel').addEventListener('click', ()=>{ holder.innerHTML=''; });
  holder.querySelector('#nsSubmit').addEventListener('click', async ()=>{
    const title = holder.querySelector('#nsTitle').value.trim();
    const author = holder.querySelector('#nsAuthor').value.trim();
    const genre = holder.querySelector('#nsGenre').value.trim();
    const synopsis = holder.querySelector('#nsSynopsis').value.trim();
    const status = holder.querySelector('#nsStatus').value;
    if(!title){ toast('Judul wajib diisi.', 'error'); return; }
    try{
      await createStory({title, author, genre, synopsis, coverTheme:selectedTheme, status});
      toast('Cerita berhasil dibuat.');
      holder.innerHTML = '';
    }catch(err){ toast('Gagal menyimpan cerita.', 'error'); }
  });
}

async function renderAdminChapterManager(body, storyId){
  body.innerHTML = `<div class="spinner"></div>`;
  const story = state.allStories.find(s=>s.id===storyId) || {id:storyId, title:'Cerita'};
  const chapters = await getChaptersMeta(storyId, true);
  body.innerHTML = `
    <a href="#/admin/stories" class="muted" style="font-size:0.82rem;">&larr; Semua Cerita</a>
    <div class="admin-row-title" style="margin:10px 0 16px;">Kelola Bab — ${escapeHtml(story.title)}</div>
    <div id="chapterFormHolder"></div>
    <button class="btn btn-brass btn-sm" id="newChapterBtn" style="margin-bottom:16px;">+ Tambah Bab Baru</button>
    ${ chapters.length===0 ? `<div class="empty-state"><h3>Belum ada bab</h3><p>Tambahkan bab pertama untuk cerita ini.</p></div>` :
      chapters.map(ch=>`
        <div class="admin-row">
          <div>
            <div class="admin-row-title">Bab ${ch.number} — ${escapeHtml(ch.title)}</div>
            <div class="admin-row-sub">${formatNumber(ch.wordCount)} kata · ${ch.pageCount} halaman</div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost btn-sm" data-edit="${ch.id}">Sunting</button>
            <button class="btn btn-danger btn-sm" data-del="${ch.id}" data-words="${ch.wordCount}">Hapus</button>
          </div>
        </div>
      `).join('')
    }
  `;
  const formHolder = document.getElementById('chapterFormHolder');
  document.getElementById('newChapterBtn').addEventListener('click', ()=>{
    formHolder.innerHTML = chapterFormHtml(null, chapters.length+1);
    bindChapterForm(formHolder, storyId, null, 0);
  });
  body.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const chapterId = btn.dataset.edit;
      const ch = chapters.find(c=>c.id===chapterId);
      const pages = await getChapterContent(storyId, chapterId, true);
      formHolder.innerHTML = chapterFormHtml(ch, ch.number, pages.join('\n\n'));
      bindChapterForm(formHolder, storyId, chapterId, ch.wordCount);
      formHolder.scrollIntoView({behavior:'smooth'});
    });
  });
  body.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Hapus bab ini?')) return;
      await deleteChapterFn(storyId, btn.dataset.del, parseInt(btn.dataset.words,10)||0);
      toast('Bab dihapus.');
      renderAll();
    });
  });
}
function chapterFormHtml(existing, suggestedNumber, existingContent){
  return `
    <div class="panel" style="margin-bottom:18px;background:var(--ink-3);">
      <div class="admin-row-title" style="margin-bottom:10px;">${existing ? 'Sunting Bab' : 'Bab Baru'}</div>
      <div class="field-row">
        <div class="field-group" style="max-width:120px;">
          <label class="field-label">Nomor Bab</label>
          <input class="field" id="chNumber" type="number" min="1" value="${existing ? existing.number : suggestedNumber}" />
        </div>
        <div class="field-group">
          <label class="field-label">Judul Bab</label>
          <input class="field" id="chTitle" value="${existing ? escapeHtml(existing.title) : ''}" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Isi Cerita</label>
        <textarea class="field" id="chContent" rows="14" placeholder="Tulis isi bab di sini. Pisahkan paragraf dengan baris kosong.">${existing ? escapeHtml(existingContent) : ''}</textarea>
        <div class="field-hint" id="chWordCount">0 kata · 0 halaman (otomatis dibagi setiap ${formatNumber(WORDS_PER_PAGE)} kata)</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-brass" id="chSubmit">Simpan Bab</button>
        <button class="btn btn-ghost" id="chCancel">Batal</button>
      </div>
    </div>`;
}
function bindChapterForm(holder, storyId, chapterId, oldWordCount){
  const contentArea = holder.querySelector('#chContent');
  const counter = holder.querySelector('#chWordCount');
  function updateCounter(){
    const words = countWords(contentArea.value);
    const pages = Math.max(Math.ceil(words / WORDS_PER_PAGE), words>0?1:0);
    counter.textContent = `${formatNumber(words)} kata · ${pages} halaman (otomatis dibagi setiap ${formatNumber(WORDS_PER_PAGE)} kata)`;
  }
  contentArea.addEventListener('input', updateCounter);
  updateCounter();
  holder.querySelector('#chCancel').addEventListener('click', ()=>{ holder.innerHTML=''; });
  holder.querySelector('#chSubmit').addEventListener('click', async ()=>{
    const number = parseInt(holder.querySelector('#chNumber').value, 10);
    const title = holder.querySelector('#chTitle').value.trim();
    const content = contentArea.value.trim();
    if(!number || !title || !content){ toast('Nomor bab, judul, dan isi wajib diisi.', 'error'); return; }
    try{
      if(chapterId) await editChapter(storyId, chapterId, oldWordCount, {number, title, content});
      else await addChapter(storyId, {number, title, content});
      toast('Bab berhasil disimpan.');
      go(`#/admin/stories/${storyId}`);
      renderAll();
    }catch(err){ toast('Gagal menyimpan bab.', 'error'); }
  });
}

async function renderAdminRequests(body){
  body.innerHTML = `<div class="spinner"></div>`;
  const q = query(collection(db,'access'), where('approved','==', false));
  const snap = await getDocs(q);
  const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
  body.innerHTML = `
    <div class="admin-row-title" style="margin-bottom:14px;">Permintaan Premium Menunggu</div>
    ${ list.length===0 ? `<div class="empty-state"><h3>Tidak ada permintaan</h3><p>Semua permintaan premium sudah ditangani.</p></div>` :
      list.map(r=>`
        <div class="admin-row">
          <div>
            <div class="admin-row-title">${escapeHtml(r.storyTitle)}</div>
            <div class="admin-row-sub">${escapeHtml(r.userEmail)} ${r.note ? '· "'+escapeHtml(r.note)+'"' : ''} · ${formatDate(r.createdAt)}</div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-brass btn-sm" data-approve="${r.id}">Konfirmasi</button>
            <button class="btn btn-danger btn-sm" data-reject="${r.id}">Tolak</button>
          </div>
        </div>
      `).join('')
    }`;
  body.querySelectorAll('[data-approve]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await approveAccess(btn.dataset.approve);
      toast('Premium dikonfirmasi untuk pembaca ini.');
      renderAdminRequests(body);
    });
  });
  body.querySelectorAll('[data-reject]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await rejectAccess(btn.dataset.reject);
      toast('Permintaan ditolak.');
      renderAdminRequests(body);
    });
  });
}

async function renderAdminSettings(body){
  body.innerHTML = `<div class="spinner"></div>`;
  const pay = await getPaymentSettings();
  body.innerHTML = `
    <div class="admin-row-title" style="margin-bottom:14px;">Pengaturan Pembayaran</div>
    <p class="muted" style="font-size:0.84rem;margin-top:0;">Informasi ini akan ditampilkan ke pembaca saat membuka fitur premium (${formatRupiah(PREMIUM_PRICE)} per cerita).</p>
    <div class="field-group"><label class="field-label">Nama Bank / E-wallet</label><input class="field" id="setBank" value="${escapeHtml(pay.bankName)}" /></div>
    <div class="field-group"><label class="field-label">Nomor Rekening</label><input class="field" id="setAcc" value="${escapeHtml(pay.accountNumber)}" /></div>
    <div class="field-group"><label class="field-label">Atas Nama</label><input class="field" id="setName" value="${escapeHtml(pay.accountHolder)}" /></div>
    <button class="btn btn-brass" id="setSave">Simpan Pengaturan</button>
  `;
  document.getElementById('setSave').addEventListener('click', async ()=>{
    const bankName = document.getElementById('setBank').value.trim();
    const accountNumber = document.getElementById('setAcc').value.trim();
    const accountHolder = document.getElementById('setName').value.trim();
    try{
      await savePaymentSettings({bankName, accountNumber, accountHolder});
      toast('Pengaturan pembayaran disimpan.');
    }catch(err){ toast('Gagal menyimpan pengaturan.', 'error'); }
  });
}

/* ============================= MAIN RENDER ============================= */
async function renderAll(){
  if(!state.authReady){ return; }
  renderNavbar();
  const r = parseRoute();
  if(r.view==='home') renderHome(r.q||'');
  else if(r.view==='storyDetail') renderStoryDetail(r.storyId);
  else if(r.view==='reader') renderReader(r);
  else if(r.view==='admin') renderAdmin(r);
  else renderHome('');
}

listenAllStories();
renderAll();
</script>
</body>
