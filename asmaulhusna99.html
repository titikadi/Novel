let currentAudio = null;
let currentIndex = -1;

function renderList(){
  let html = "";
  asmaul.forEach((a,i)=>{
    html += `
    <div class="card" id="card${i}" onclick="playAudio(${i})">
      <div class="top">
        <div class="number">${a.no}</div>
        <button class="btn play" onclick="event.stopPropagation();playAudio(${i})">▶ Play</button>
      </div>
      <div class="arab">${a.arab}</div>
      <div class="latin">${a.latin}</div>
      <div class="arti">${a.arti}</div>
      <audio id="audio${i}" src="https://quranicaudio.com/api/audio/asmaul-husna/${a.no}" preload="none" onended="nextAudio()"></audio>
    </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function playAudio(i){
  // Stop audio yang lagi jalan
  if(currentAudio && currentAudio !== document.getElementById("audio"+i)){
    currentAudio.pause();
    currentAudio.currentTime = 0;
    document.getElementById("card"+currentIndex).classList.remove("playing");
  }
  
  let audio = document.getElementById("audio"+i);
  currentAudio = audio;
  currentIndex = i;
  
  audio.play().then(()=>{
    document.getElementById("card"+i).classList.add("playing");
    document.getElementById("card"+i).scrollIntoView({behavior:"smooth", block:"center"});
  }).catch(()=>{
    alert("Klik tombol play dulu bro, browser blokir autoplay");
  });
}

function nextAudio(){
  document.getElementById("card"+currentIndex).classList.remove("playing");
  let next = currentIndex + 1;
  if(next < asmaul.length){
    playAudio(next);
  }else{
    currentAudio = null;
    currentIndex = -1;
  }
}

renderList();
</script>
